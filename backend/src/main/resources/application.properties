spring.application.name=language_school_backend
spring.config.import=optional:file:./secrets.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:language_application}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}

spring.jpa.open-in-view=false

server.error.whitelabel.enabled=false

security.jwt.issuer=language-school
security.jwt.access-exp-min=120
security.jwt.refresh-exp-days=30
security.jwt.refresh-cookie-name=refresh_token
security.jwt.refresh-rotate=true
security.jwt.secret=${SECURITY_JWT_SECRET:}

anthropic.api.baseUrl=https://api.anthropic.com/v1
anthropic.api.version=2023-06-01
anthropic.model=claude-3-5-haiku-latest
anthropic.api.key=${ANTHROPIC_API_KEY:}

security.field-encryption.key=${SECURITY_FIELD_ENCRYPTION_KEY:}

ai.http.connect-timeout-ms=5000
ai.http.read-timeout-ms=45000
ai.limits.max-user-message-chars=1200
ai.limits.max-system-prompt-chars=2000
ai.limits.max-output-tokens=2400
ai.limits.max-hints=3

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
